<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isminia — Planning Tournage</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #ffffff;
  --surface: #f5f5f5;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #888;
  --accent-dim: rgba(26,26,26,0.06);
  --red: #c0392b;
  --red-bg: #fff8f7;
  --red-border: #f5c6c2;
}
body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; }

header { padding: 44px 40px 28px; border-bottom: 1px solid var(--border); }
header h1 { font-size: clamp(2rem,5vw,3.2rem); font-weight: 800; letter-spacing: -2px; color: #000; line-height: 1; }
header h1 span { color: var(--red); }
header p { font-family: 'Lora',serif; font-style: italic; color: var(--muted); font-size: 0.88rem; margin-top: 6px; }

.tabs { display: flex; gap: 2px; padding: 0 40px; border-bottom: 1px solid var(--border); margin-top: 24px; }
.tab-btn { font-family: 'Syne',sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 12px 18px; background: transparent; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: #000; border-bottom-color: #000; }

.main { padding: 32px 40px; }
.tab-pane { display: none; }
.tab-pane.active { display: block; }

.schedule-scroll { overflow-x: auto; padding-bottom: 8px; }
.schedule-grid { display: grid; grid-template-columns: repeat(6, minmax(185px,1fr)) minmax(200px,230px); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; min-width: 980px; }

.col-header { background: var(--surface); padding: 13px 15px; border-bottom: 2px solid #000; }
.col-header.deadline-col { border-bottom-color: var(--red); }
.col-day { font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.col-label { font-size: 0.92rem; font-weight: 700; color: #000; margin-top: 2px; }
.col-label.red { color: var(--red); }
.col-sub { font-family: 'Lora',serif; font-style: italic; font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
.col-body { background: var(--bg); padding: 11px; display: flex; flex-direction: column; gap: 7px; }

.event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; cursor: pointer; transition: border-color .15s, background .15s, box-shadow .15s; position: relative; }
.event-card:hover { border-color: #000; background: var(--accent-dim); box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.event-card.deadline { background: var(--red-bg); border-color: var(--red-border); }
.event-card.deadline:hover { border-color: var(--red); }
.event-time { font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.event-card.deadline .event-time { color: var(--red); }
.event-title { font-size: 0.8rem; font-weight: 700; color: #000; line-height: 1.35; margin-bottom: 6px; }
.event-chips { display: flex; flex-wrap: wrap; gap: 3px; }
.chip { font-size: 0.58rem; font-weight: 700; padding: 2px 6px; border-radius: 2px; background: #e8e8e8; color: #555; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
.chip:hover { background: #000; color: #fff; }
.event-arrow { position: absolute; top: 8px; right: 8px; font-size: 0.6rem; color: #ccc; transition: color .15s; }
.event-card:hover .event-arrow { color: #000; }
.schedule-hint { font-family: 'Lora',serif; font-style: italic; font-size: 0.75rem; color: var(--muted); margin-top: 12px; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; backdrop-filter: blur(3px); align-items: center; justify-content: center; padding: 20px; }
.overlay.open { display: flex; }
.modal { background: #fff; border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; animation: up .2s ease; box-shadow: 0 8px 40px rgba(0,0,0,.15); }
@keyframes up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
.modal-hd { padding: 22px 22px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-time { font-size: 0.58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.modal-title { font-size: 1.05rem; font-weight: 700; color: #000; line-height: 1.3; }
.close-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.close-btn:hover { background: #000; color: #fff; border-color: #000; }
.modal-bd { padding: 18px 22px 22px; display: flex; flex-direction: column; gap: 16px; }
.sec-label { font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.modal-desc { font-family: 'Lora',serif; font-size: 0.88rem; line-height: 1.7; color: #444; }
.req-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.req-list li { font-size: 0.84rem; color: #444; padding-left: 16px; position: relative; line-height: 1.5; }
.req-list li::before { content: '→'; position: absolute; left: 0; color: #000; font-size: 0.75rem; }
.lieu-box { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px; font-size: 0.85rem; color: #222; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-cast-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.modal-cast-chip { font-size: 0.75rem; font-weight: 600; padding: 5px 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; color: var(--text); cursor: pointer; transition: all .15s; }
.modal-cast-chip:hover { background: #000; color: #fff; border-color: #000; }

.cast-search-wrap { max-width: 360px; margin-bottom: 22px; position: relative; }
.cast-search { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 10px 14px 10px 36px; font-family: 'Syne',sans-serif; font-size: 0.85rem; color: var(--text); outline: none; transition: border-color .15s; }
.cast-search:focus { border-color: #000; }
.cast-search::placeholder { color: var(--muted); }
.sico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
.cast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 7px; }
.cast-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 13px 15px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.cast-card:hover { border-color: #000; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.cast-card.active { border-color: #000; background: var(--accent-dim); }
.cast-name { font-size: 0.9rem; font-weight: 700; color: #000; margin-bottom: 3px; }
.cast-role { font-family: 'Lora',serif; font-style: italic; font-size: 0.74rem; color: var(--muted); margin-bottom: 8px; line-height: 1.4; }
.cast-day-chips { display: flex; flex-wrap: wrap; gap: 3px; }
.cast-day-chip { font-size: 0.56rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 2px 6px; background: #e8e8e8; border-radius: 2px; color: #666; }

.person-detail { display: none; background: #fff; border: 1px solid #000; border-radius: 6px; padding: 24px; margin-top: 16px; animation: up .2s ease; }
.person-detail.open { display: block; }
.pd-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.pd-name { font-size: 1.5rem; font-weight: 800; color: #000; letter-spacing: -0.5px; }
.pd-role { font-family: 'Lora',serif; font-style: italic; color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
.inv-block { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
.inv-hd { background: var(--surface); padding: 9px 13px; display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
.inv-day { font-size: 0.58rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); flex-shrink: 0; }
.inv-scene { font-size: 0.82rem; font-weight: 700; color: #000; }
.inv-bd { padding: 12px 13px; display: flex; flex-direction: column; gap: 12px; }
.inv-task { font-family: 'Lora',serif; font-size: 0.85rem; color: #444; line-height: 1.65; }
.sub-lbl { font-size: 0.56rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.script-lines { display: flex; flex-direction: column; gap: 6px; }
.script-line { background: var(--surface); border-left: 2px solid #000; padding: 7px 11px; border-radius: 0 3px 3px 0; }
.script-char { font-size: 0.58rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #000; margin-bottom: 3px; }
.script-text { font-family: 'Lora',serif; font-style: italic; font-size: 0.83rem; color: #333; line-height: 1.5; }

@media (max-width:600px) { header, .tabs, .main { padding-left:18px; padding-right:18px; } }
</style>
</head>
<body>

<header>
  <h1>IS<span>MINIA</span></h1>
  <p>Western Fantastique — Planning de tournage</p>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('planning',this)">Planning</button>
  <button class="tab-btn" onclick="switchTab('cast',this)">Cast</button>
</div>

<div class="main">
  <div id="tab-planning" class="tab-pane active">
    <div class="schedule-scroll">
      <div class="schedule-grid" id="scheduleGrid"></div>
    </div>
    <p class="schedule-hint">Clique sur une tâche pour les détails, le lieu et les prérequis. Clique sur un nom pour sa fiche complète.</p>
  </div>
  <div id="tab-cast" class="tab-pane">
    <div class="cast-search-wrap">
      <span class="sico">⌕</span>
      <input type="text" class="cast-search" id="castSearch" placeholder="Tape ton prénom…" oninput="filterCast(this.value)">
    </div>
    <div class="cast-grid" id="castGrid"></div>
    <div class="person-detail" id="personDetail">
      <div class="pd-top">
        <div><div class="pd-name" id="pdName"></div><div class="pd-role" id="pdRole"></div></div>
        <button class="close-btn" onclick="closeDetail()">✕</button>
      </div>
      <div id="pdBody"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modalBox">
    <div class="modal-hd">
      <div><div class="modal-time" id="mTime"></div><div class="modal-title" id="mTitle"></div></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bd" id="mBody"></div>
  </div>
</div>

<script>
var DAYS = [
  {
    key: "mer", label: "Mercredi", sub: "", isDeadline: false,
    events: [
      {
        time: "Dans la journée",
        title: "Appeler The Rider Saloon",
        desc: "Confirmer la disponibilité et la réservation du lieu pour le tournage saloon du samedi matin.",
        lieu: "Appel téléphonique",
        prereqs: ["Avoir le numéro du Rider Saloon"],
        cast: ["Responsable orga"]
      }
    ]
  },
  {
    key: "jeu", label: "Jeudi", sub: "", isDeadline: false,
    events: [
      {
        time: "17h — 18h",
        title: "Scène Bibliothèque (Acte 1)",
        desc: "Auxence entre dans la bibliothèque, marche entre les rayonnages. Un livre tombe au sol — seul élément en couleur. Il l'ouvre, lumière colorée dans ses yeux. Transition vers le Far West.",
        lieu: "Bibliothèque Nelson Mandela",
        prereqs: ["Prévoir un vieux livre style conte", "Créer / coller un label Isminia sur la couverture"],
        cast: ["Auxence"]
      },
      {
        time: "~19h (avant Petit Bar)",
        title: "Scènes ME — Figurants (Actes 1 & 4)",
        desc: "Ping-pong, baby-foot, Comif. Scènes de vie du campus pour l'intro désaturée ET la scène finale colorée.",
        lieu: "Maison des Élèves — Patio, Comif, baby-foot",
        prereqs: ["Baptiste DOIT être présent", "Sondage figurants fait en amont", "Prévoir voiture(s) si nécessaire"],
        cast: ["Baptiste", "Clément", "Nicolas", "Mariem", "Peter", "Noa", "Mathis", "Youenn", "Mathieu"]
      },
      {
        time: "14h",
        title: "Tournage Duel (Acte 2)",
        desc: "Rue poussiéreuse. Plans resserrés : bottes, mains, yeux. Édouard et Maxence face à face. Auxence surgit au milieu. Tension. Pistolets à eau. Freeze frames.",
        lieu: "Lieu de l'inté",
        prereqs: ["Être sur le lieu de tournage à 14h", "Prévoir voiture(s) pour le déplacement", "Bottes + jean + chapeau cowboy", "Pistolets à eau — acheter chez Action"],
        cast: ["Auxence", "Édouard", "Maxence"]
      },
      {
        time: "~19h",
        title: "Fond Vert — Videur (Scène devant le Saloon)",
        desc: "Scène tournée sur fond vert : Jilliane devant le saloon (Acte 2) — bloque l'entrée, refuse pistolet et chapeau, accepte le fromage.",
        lieu: "BDA — Salle fond vert",
        prereqs: ["Récupérer le fond vert au BDA", "Tenue tournage COMPLÈTE", "Fromage + saucisson (Maxence apporte)"],
        cast: ["Jilliane", "Édouard", "Maxence", "Auxence"]
      },
    ]
  },
  {
    key: "ven", label: "Vendredi", sub: "", isDeadline: false,
    events: [
      {
        time: "~19h",
        title: "Photos Freeze Frames (affiches WANTED)",
        desc: "Séance photo de chaque personnage pour les affiches WANTED et les freeze frames du montage.",
        lieu: "À déterminer",
        prereqs: ["Vérifier disponibilités du cast en amont", "Appareil photo ou smartphone haute qualité"],
        cast: ["Bastien", "Youenn", "Édouard", "Maxence", "Jilliane", "Thibault", "Marin", "Thiporrah"]
      }
    ]
  },
  {
    key: "sam", label: "Samedi", sub: "", isDeadline: false,
    events: [
      {
        time: "10h",
        title: "Tournage Saloon (Acte 2)",
        desc: "Plan A : The Rider Saloon. Plan B : fond vert BDA.\nArrivée des personnages, confrontation avec le videur, table de poker (Thibault + Marin), duel final Auxence vs Marin, discours d'Auxence. Ambiance musicale avec Camille et Bastien.",
        lieu: "À déterminer",
        prereqs: ["Être sur le lieu de tournage à 10h pile", "Confirmer le Rider avant (appel mercredi)", "Prévoir voiture(s) pour le trajet", "Guitar + musique préparée", "Mallette de poker", "Quelques € pour consommations si The Rider", "Tout le monde en tenue tournage"],
        cast: ["Auxence", "Édouard", "Maxence", "Jilliane", "Thibault", "Marin", "Thiporrah", "Camille", "Bastien"]
      },
    ]
  },
  {
    key: "dim", label: "Dimanche", sub: "", isDeadline: false,
    events: [
      {
        time: "Matin",
        title: "Plans Drone — ME vide & animée",
        desc: "Filmer la Maison des Élèves vide (patio, tables, potager, couleurs désaturées) puis animée avec les figurants.",
        lieu: "Maison des Élèves — extérieur, patio, potager",
        prereqs: ["Drone disponible et chargé", "Sondage figurants fait en amont", "Fichiers exportés et partagés avec le monteur"],
        cast: ["Baptiste"]
      }
    ]
  },
  {
    key: "deadline", label: "Deadline", sub: "Dimanche soir", isDeadline: true,
    events: [
      {
        time: "DEADLINE",
        title: "Affiches WANTED",
        desc: "Toutes les affiches des personnages (Édouard, Maxence, Jilliane, Thibault, Marin, Thiporrah) créées et rendues pour le montage.",
        lieu: "—",
        prereqs: ["Photos de Bastien reçues", "Template affiche WANTED western créé", "Une affiche par personnage principal"],
        cast: ["Youenn"]
      },
      {
        time: "DEADLINE",
        title: "Voix Off",
        desc: "Enregistrement de toutes les voix off du film : intro campus, mythologie du bélier, prophétie, transitions entre actes, voix off finale.",
        lieu: "Espace calme sans écho (chambre, local isolé...)",
        prereqs: ["Micro + logiciel d'enregistrement", "Texte complet du scénario imprimé", "Ton naturel pour l'intro, plus mythique pour la prophétie"],
        cast: ["Soulaf", "Bastien"]
      },
      {
        time: "DEADLINE",
        title: "Animations",
        desc: "Créer les animations du film : livre qui s'anime (ref TikTok ZSmPcrPha / ZSmfEPqYY), carte style Game of Thrones (voyageurs, obstacles, Maxence qui explose), transitions de scènes.",
        lieu: "—",
        prereqs: ["Logiciel d'animation", "Liens ref TikTok sauvegardés", "Coordination avec le montage"],
        cast: ["Thiporrah", "Bastien"]
      }
    ]
  }
];

var CAST = {
  "Auxence": {
    role: "Protagoniste — Étudiant en quête de sens",
    days: ["Jeudi", "Vendredi", "Samedi"],
    involvements: [
      {
        day: "Jeudi 17h–18h", scene: "Scène Bibliothèque — Acte 1",
        lieu: "Bibliothèque Nelson Mandela",
        task: "Auxence entre dans la bibliothèque, marche entre les rayonnages. Un livre tombe — seul élément en couleur dans un monde noir et blanc. Il l'ouvre, lumière colorée dans ses yeux.",
        prep: ["Tenue neutre (pas western)", "Laisser la lumière du livre se refléter sur le visage"],
        scripts: []
      },
      {
        day: "Vendredi ~18h", scene: "Fond Vert — Porte + Énigme + Finale (Actes 3 & 4)",
        lieu: "BDA — Salle fond vert",
        task: "Devant la porte massive : compteur s'enclenche. Il rentre seul dans la salle blanche et résout l'énigme. Puis scène soirée jeux avec les potes.",
        prep: ["Tenue tournage COMPLÈTE (même tenue que tout le film)", "Fond vert BDA", "Jeu de société apporté"],
        scripts: [
          { char: "AUXENCE", line: "Du calme, du calme les gars. C'est moi qui vous ai amenés jusque-là ; je ne compte pas vous abandonner. Je rentre, faites-moi confiance : je ressortirai avec la Jouvence." }
        ]
      },
      {
        day: "Samedi 10h", scene: "Saloon — Acte 2",
        lieu: "À déterminer",
        task: "Arrive avec ses compagnons. Affronte le videur. S'installe au poker. Gagne contre Marin. Lance le grand discours à toute la salle.",
        prep: ["Tenue tournage COMPLÈTE", "Être sur place à 10h pile"],
        scripts: [
          { char: "AUXENCE", line: "On n'est pas des pélo. On est là pour une quête des plus importantes…" },
          { char: "AUXENCE", line: "Salut les gars, on est à la recherche d'un Coyote. Vous pouvez nous aider ?" },
          { char: "AUXENCE", line: "Pas pour cette fois." },
          { char: "AUXENCE", line: "Attends ! Je suis à la recherche du Coyote. J'ai besoin de son aide pour rétablir l'ambiance à Isminia." },
          { char: "AUXENCE (discours)", line: "Je suis prêt à tout pour rétablir l'atmosphère d'antan d'Isminia, même à mettre ma vie en péril. Cette quête n'est pas seulement la mienne. Elle appartient à tous ceux présents dans ce monde. Soyez dynamiquement miens, chers amis, et mettons la main sur ce Coyote ! Êtes-vous avec moi ?" }
        ]
      },
      {
        day: "Jeudi 14h", scene: "Duel — Acte 2",
        lieu: "Lieu de l'inté",
        task: "Surgit au milieu du duel Édouard/Maxence. Réagit aux pistolets à eau. Propose à Édouard et Maxence de le rejoindre.",
        prep: ["Tenue tournage COMPLÈTE"],
        scripts: [
          { char: "AUXENCE", line: "C'est à moi de dire ça." },
          { char: "AUXENCE", line: "Vous m'avez bien fait rire. J'ai besoin d'aide : je suis en terre inconnue et je cherche le Coyote, détenteur de la Jouvence Dynamitée." },
          { char: "AUXENCE", line: "Dernière question. Je vous trouve de bonne compagnie… est-ce que vous voulez me suivre dans cette quête ?" }
        ]
      }
    ]
  },
  "Édouard": {
    role: "Édouard le Grand — Cow-boy provocateur, dueliste excessif",
    days: ["Jeudi", "Vendredi (photos)", "Samedi"],
    involvements: [
      {
        day: "Vendredi ~18h", scene: "Fond Vert — Scène finale (Acte 4)",
        lieu: "BDA — Salle fond vert",
        task: "Soirée jeux avec Auxence et les potes.",
        prep: ["Tenue tournage"],
        scripts: [{ char: "ÉDOUARD (Pote 1)", line: "Soirée jeux ce soir ! On y va ?" }]
      },
      {
        day: "Vendredi ~19h", scene: "Photo Freeze Frame",
        lieu: "À déterminer",
        task: "Photo pour l'affiche WANTED d'Édouard le Grand.",
        prep: ["Tenue tournage", "Attitude provocatrice, pistolet à eau en main"],
        scripts: []
      },
      {
        day: "Samedi 10h", scene: "Saloon — Acte 2",
        lieu: "À déterminer",
        task: "Compagnon d'Auxence. Sort le pistolet à eau au videur (refusé). Ambiance saloon.",
        prep: ["Tenue tournage COMPLÈTE", "Pistolet à eau", "Être sur place à 10h pile"],
        scripts: []
      },
      {
        day: "Jeudi 14h", scene: "Duel — Acte 2",
        lieu: "Lieu de l'inté",
        task: "Face à Maxence dans le duel. Plans : mains, yeux, bottes. Dégaine le pistolet à eau.",
        prep: ["Tenue tournage (bottes + jean + chapeau cowboy)", "Pistolet à eau", "Prévoir voiture si possible"],
        scripts: [

// ═══ BUILD SCHEDULE ═══
function buildSchedule() {
  var grid = document.getElementById("scheduleGrid");
  grid.innerHTML = "";
  grid.style.gridTemplateColumns = "repeat(" + DAYS.length + ", minmax(185px,1fr))";

  // Headers
  DAYS.forEach(function(d) {
    var hd = document.createElement("div");
    hd.className = "col-header" + (d.isDeadline ? " deadline-col" : "");
    hd.innerHTML = '<div class="col-day">' + (d.isDeadline ? "deadline" : d.key) + '</div>'
      + '<div class="col-label' + (d.isDeadline ? " red" : "") + '">' + d.label + '</div>'
      + (d.sub ? '<div class="col-sub">' + d.sub + '</div>' : "");
    grid.appendChild(hd);
  });

  // Bodies
  DAYS.forEach(function(d) {
    var body = document.createElement("div");
    body.className = "col-body";
    (d.events || []).forEach(function(ev) {
      var card = document.createElement("div");
      card.className = "event-card" + (d.isDeadline ? " deadline" : "");
      card.onclick = (function(e) { return function() { openModal(e); }; })(ev);
      var shown = ev.cast.slice(0, 4);
      var more = ev.cast.length > 4 ? ev.cast.length - 4 : 0;
      var chips = shown.map(function(p) {
        return '<span class="chip" onclick="event.stopPropagation();openCast(\'' + p + '\')">' + p + '</span>';
      }).join("") + (more ? '<span class="chip">+' + more + '</span>' : "");
      card.innerHTML = '<div class="event-time">' + ev.time + '</div>'
        + '<div class="event-title">' + ev.title + '</div>'
        + '<div class="event-chips">' + chips + '</div>'
        + '<span class="event-arrow">↗</span>';
      body.appendChild(card);
    });
    grid.appendChild(body);
  });
}

// ═══ MODAL ═══
function openModal(ev) {
  document.getElementById("mTime").textContent = ev.time;
  document.getElementById("mTitle").textContent = ev.title;
  var h = "";
  if (ev.lieu && ev.lieu !== "—") {
    h += '<div class="modal-section"><div class="sec-label">Lieu</div><div class="lieu-box">📍 ' + ev.lieu + '</div></div>';
  }
  h += '<div class="modal-section"><div class="sec-label">Description</div><div class="modal-desc">' + ev.desc.replace(/\n/g, "<br>") + '</div></div>';
  if (ev.prereqs && ev.prereqs.length) {
    h += '<div class="modal-section"><div class="sec-label">Prérequis</div><ul class="req-list">' + ev.prereqs.map(function(p) { return "<li>" + p + "</li>"; }).join("") + '</ul></div>';
  }
  if (ev.cast && ev.cast.length) {
    h += '<div class="modal-section"><div class="sec-label">Cast concerné</div><div class="modal-cast-chips">' + ev.cast.map(function(p) { return '<span class="modal-cast-chip" onclick="openCast(\'' + p + '\')">' + p + '</span>'; }).join("") + '</div></div>';
  }
  document.getElementById("mBody").innerHTML = h;
  document.getElementById("overlay").classList.add("open");
}

function closeModalOutside(e) { if (e.target === document.getElementById("overlay")) closeModal(); }
function closeModal() { document.getElementById("overlay").classList.remove("open"); }

// ═══ CAST ═══
function buildCast(filter) {
  filter = filter || "";
  var grid = document.getElementById("castGrid");
  grid.innerHTML = "";
  var lo = filter.toLowerCase();
  Object.keys(CAST).forEach(function(name) {
    var data = CAST[name];
    if (lo && name.toLowerCase().indexOf(lo) === -1 && data.role.toLowerCase().indexOf(lo) === -1) return;
    var card = document.createElement("div");
    card.className = "cast-card";
    card.id = "cc-" + name;
    card.onclick = (function(n) { return function() { showPerson(n); }; })(name);
    card.innerHTML = '<div class="cast-name">' + name + '</div>'
      + '<div class="cast-role">' + data.role + '</div>'
      + '<div class="cast-day-chips">' + data.days.map(function(d) { return '<span class="cast-day-chip">' + d + '</span>'; }).join("") + '</div>';
    grid.appendChild(card);
  });
}

function filterCast(v) { buildCast(v); }

function showPerson(name) {
  var data = CAST[name];
  if (!data) return;
  document.querySelectorAll(".cast-card").forEach(function(c) { c.classList.remove("active"); });
  var cc = document.getElementById("cc-" + name);
  if (cc) { cc.classList.add("active"); cc.scrollIntoView({ behavior: "smooth", block: "nearest" }); }
  document.getElementById("pdName").textContent = name;
  document.getElementById("pdRole").textContent = data.role;
  var h = "";
  data.involvements.forEach(function(inv) {
    h += '<div class="inv-block"><div class="inv-hd"><div class="inv-day">' + inv.day + '</div><div class="inv-scene">' + inv.scene + '</div></div><div class="inv-bd">';
    if (inv.lieu && inv.lieu !== "—") {
      h += '<div><div class="sub-lbl">Lieu</div><div style="font-size:.83rem;color:#333;font-weight:600;">📍 ' + inv.lieu + '</div></div>';
    }
    h += '<div class="inv-task">' + inv.task + '</div>';
    if (inv.prep && inv.prep.length) {
      h += '<div><div class="sub-lbl">À prévoir</div><ul class="req-list">' + inv.prep.map(function(p) { return "<li>" + p + "</li>"; }).join("") + '</ul></div>';
    }
    if (inv.scripts && inv.scripts.length) {
      h += '<div><div class="sub-lbl">Répliques</div><div class="script-lines">' + inv.scripts.map(function(s) {
        return '<div class="script-line"><div class="script-char">' + s.char + '</div><div class="script-text">' + s.line + '</div></div>';
      }).join("") + '</div></div>';
    }
    h += '</div></div>';
  });
  document.getElementById("pdBody").innerHTML = h;
  var det = document.getElementById("personDetail");
  det.classList.add("open");
  det.scrollIntoView({ behavior: "smooth", block: "start" });
}

function closeDetail() {
  document.getElementById("personDetail").classList.remove("open");
  document.querySelectorAll(".cast-card").forEach(function(c) { c.classList.remove("active"); });
}

function openCast(name) {
  closeModal();
  document.querySelectorAll(".tab-pane").forEach(function(t) { t.classList.remove("active"); });
  document.getElementById("tab-cast").classList.add("active");
  document.querySelectorAll(".tab-btn").forEach(function(b) {
    b.classList.remove("active");
    if (b.textContent.indexOf("Cast") !== -1) b.classList.add("active");
  });
  setTimeout(function() { buildCast(""); showPerson(name); }, 60);
}

function switchTab(name, btn) {
  document.querySelectorAll(".tab-pane").forEach(function(t) { t.classList.remove("active"); });
  document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}

buildSchedule();
buildCast();
